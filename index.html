<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="CookieLab OS, a retro desktop-style project launcher for research tools and experiments."
    />
    <meta name="theme-color" content="#93c5fd" />
    <title>CookieLab OS</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="./styles/glass-os.css" />
  </head>
  <body>
    <noscript>
      <div class="noscript-panel">
        CookieLab OS needs JavaScript to open project windows.
      </div>
    </noscript>

    <div id="app" class="app-root" aria-live="polite"></div>

    <!-- 창 Liquid Glass 굴절용 SVG 필터 (backdrop-filter: url(#windowGlassRefract)) -->
    <svg class="window-glass-defs" width="0" height="0" aria-hidden="true" focusable="false">
      <filter
        id="windowGlassRefract"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.008 0.011"
          numOctaves="2"
          seed="9"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="1.6" result="softNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="softNoise"
          scale="14"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>

    <script src="./src/data/apps.js" defer></script>
    <script src="./src/app.js" defer></script>
  </body>
</html>
